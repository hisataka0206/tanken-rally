name: Deploy to GitHub Pages

on:
  # main ブランチへの push でデプロイ
  push:
    branches: [main]
  # Actions タブから手動実行も可能
  workflow_dispatch:

# GitHub Pages にデプロイするための権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時に1つのデプロイのみ実行（古いものをキャンセルしない）
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate config.js from GitHub Secrets
        # 開発時は config.js (gitignore対象) を手書きするが、
        # 本番デプロイ時は Actions Secrets から動的に生成する
        run: |
          cat > config.js << 'EOF'
          // ⚠️ Auto-generated by GitHub Actions during deployment.
          // ⚠️ Do NOT commit this file. Edit config.example.js as the template.
          export const CONFIG = {
            GOOGLE_MAPS_API_KEY: '${{ secrets.GOOGLE_MAPS_API_KEY }}',
            OPENAI_API_KEY: '${{ secrets.OPENAI_API_KEY }}',
            GAS_URL: '${{ secrets.GAS_URL }}',
            GAS_SECRET: '${{ secrets.GAS_SECRET }}',
          };
          EOF
          echo "✅ config.js generated"
          # 鍵そのものは出力しない（行数のみ確認）
          wc -l config.js

      - name: Add .nojekyll (prevent Jekyll processing)
        # ファイル名が _ で始まるものを Jekyll が処理してしまうのを防ぐ
        run: touch .nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # リポジトリ全体をそのままアップロード
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
