<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>たんけんラリー — 言語リダイレクト</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>
    // GitHub Pages の 404 にあたったとき、URL末尾が言語コードなら ?lang= に変換して
    // index.html へリダイレクトする。
    //   /tanken-rally/EN          → /tanken-rally/?lang=en
    //   /tanken-rally/Original    → /tanken-rally/?lang=original (大人向け通常版)
    //   /tanken-rally/Elementary  → /tanken-rally/                (デフォルト＝子供版なのでクエリ不要)
    //   /tanken-rally/Kids        → /tanken-rally/                (同上)
    //   それ以外 → /tanken-rally/ （ホーム＝子供版）
    (function () {
      var path = location.pathname.replace(/\/+$/, ''); // 末尾スラッシュを除去
      var segs = path.split('/').filter(Boolean);
      var last = segs.length ? segs[segs.length - 1] : '';
      var lower = (last || '').toLowerCase();
      // langMap: パス末尾 → ?lang= 値（'' は「クエリなし＝デフォルト」を意味する）
      var langMap = {
        en: 'en', english: 'en',
        original: 'original', ja: 'original', standard: 'original', adult: 'original',
        elementary: '', kids: '', easy: '', // 末尾なし＝デフォルト＝elementary なのでクエリ省略
      };
      var base = '/' + segs.slice(0, -1).join('/') + '/';
      if (Object.prototype.hasOwnProperty.call(langMap, lower)) {
        var lang = langMap[lower];
        location.replace(base + (lang ? ('?lang=' + lang) : ''));
      } else {
        // 無関係な404 → トップへ戻す
        location.replace(base);
      }
    })();
  </script>
</head>
<body style="font-family:sans-serif;padding:24px;">
  <p>リダイレクト中です…</p>
  <p><a href="./">トップに戻る</a></p>
</body>
</html>
